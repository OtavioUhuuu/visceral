<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senha Segura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="conteudo">
        <section class="gerador">
            <h1 class="titulo">Gerador de Senha</h1>
            
            <div class="campo-resultado">
                <input name="senha" type="text" id="campo-senha" readonly placeholder="Sua senha aparecerá aqui">
            </div>

            <div class="parametro-senha">
                <span class="parametro-label">Número de caracteres:</span>
                <div class="parametro-controle">
                    <button class="parametro-senha__botao">-</button>
                    <p class="parametro-senha__texto">12</p>
                    <button class="parametro-senha__botao">+</button>
                </div>
            </div>

            <div class="opcoes-senha">
                <label class="opcao-item">
                    <input type="checkbox" class="checkbox" checked>
                    Letras Maiúsculas
                </label>
                <label class="opcao-item">
                    <input type="checkbox" class="checkbox">
                    Letras Minúsculas
                </label>
                <label class="opcao-item">
                    <input type="checkbox" class="checkbox">
                    Números
                </label>
                <label class="opcao-item">
                    <input type="checkbox" class="checkbox">
                    Símbolos
                </label>
            </div>

            <div class="seguranca-container">
                <span class="parametro-label">Força da senha:</span>
                <div class="forca-bar-wrapper">
                    <div class="forca"></div>
                </div>
                <p class="entropia"></p>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
